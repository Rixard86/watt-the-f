name: Bygg APK
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Packa upp
        run: unzip -o watt-the-f-android.zip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Installera
        working-directory: wtf-apk
        run: npm ci
      - name: Synka
        working-directory: wtf-apk
        run: npx cap sync android
      - name: Bygg
        working-directory: wtf-apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Publicera APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Watt the f* APK
          files: wtf-apk/android/app/build/outputs/apk/debug/app-debug.apk
